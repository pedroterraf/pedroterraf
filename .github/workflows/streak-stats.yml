name: Update GitHub stats

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&hide_border=true&disable_animations=true&background=0D0F21&ring=8B5CF6&fire=22D3EE&currStreakLabel=8B5CF6&sideLabels=A3A9C9&currStreakNum=EEF1FF&sideNums=EEF1FF&dates=6F7699
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate activity graph
        run: |
          curl -sf --max-time 60 -o profile/activity-graph.new.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&bg_color=0D0F21&color=EEF1FF&line=8B5CF6&point=22D3EE&area=true&area_color=8B5CF6&hide_border=true&custom_title=Contribution%20Activity%20(last%20year)" \
            && mv profile/activity-graph.new.svg profile/activity-graph.svg \
            || echo "Activity graph fetch failed, keeping previous version"

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg profile/activity-graph.svg
          git commit -m "chore: update github stats" || exit 0
          git push
